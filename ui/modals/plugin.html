<modal width="385" height="570" blur="false" closeable="true">
  <titlebar value="false" height="34">
    <div style="height:34px;display:flex;align-items:center;gap:8px;padding:0 8px;background:#f3f3f3;border-bottom:1px solid #c7c7c7;font-family:'Segoe UI',Arial,sans-serif;color:#202020;">
      <img id="pluginIcon" alt="" style="width:18px;height:18px;object-fit:contain;display:none;">
      <span id="pluginTitle" style="font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">Plugin</span>
      <button onclick="closeModal(null)" title="Close" style="margin-left:auto;width:28px;height:24px;border:0;background:transparent;border-radius:3px;display:grid;place-items:center;font-size:18px;line-height:1;cursor:pointer;color:#303030;">&times;</button>
    </div>
  </titlebar>
  <title>
    <value>Plugin</value>
  </title>
  <content>
    <iframe id="pluginFrame" style="width:100%;height:100%;border:0;display:block;background:#0f0f0f;"></iframe>
  </content>
  <script>
    const payload = window.__esd_payload || {};
    const frame = document.getElementById('pluginFrame');
    const pluginHtml = payload.htmlBase64
      ? decodeURIComponent(escape(atob(payload.htmlBase64)))
      : (payload.html || '');

    function injectPluginBridge(html, pluginId) {
      const boot = `<script>
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.addEventListener('keydown', event => {
          const key = String(event.key || '').toLowerCase();
          const blocked = key === 'f12' || (event.ctrlKey && event.shiftKey && ['i', 'j', 'c'].includes(key));
          if (blocked) {
            event.preventDefault();
            event.stopPropagation();
          }
        }, true);
        window.DIGITEK_PLUGIN_ID = ${JSON.stringify(pluginId)};
        window.pluginInvoke = function(payload) {
          return window.parent.__dgtPluginBridge(${JSON.stringify(pluginId)}, payload || {});
        };
      <\/script>`;
      return /<head[^>]*>/i.test(html)
        ? html.replace(/<head[^>]*>/i, m => m + boot)
        : boot + html;
    }

    window.__dgtPluginBridge = async function(pluginId, body) {
      if (!window.invokeBridge) throw new Error('Backend bridge not available.');
      const res = await window.invokeBridge({ action:'dgt_plugin_call', pluginId, payload: body || {} });
      if (!res || res.status !== 'ok') throw new Error((res && res.reason) || 'Plugin backend error');
      return res.result;
    };

    document.addEventListener('contextmenu', event => event.preventDefault());
    document.addEventListener('keydown', event => {
      const key = String(event.key || '').toLowerCase();
      const blocked = key === 'f12' || (event.ctrlKey && event.shiftKey && ['i', 'j', 'c'].includes(key));
      if (blocked) {
        event.preventDefault();
        event.stopPropagation();
      }
    }, true);

    if (payload.plugin && payload.plugin.name) document.title = payload.plugin.name;
    if (payload.plugin && payload.plugin.name) {
      document.getElementById('pluginTitle').textContent = payload.plugin.name;
    }
    if (payload.plugin && payload.plugin.iconDataUri) {
      const icon = document.getElementById('pluginIcon');
      icon.src = payload.plugin.iconDataUri;
      icon.style.display = '';
    }
    frame.srcdoc = injectPluginBridge(pluginHtml, payload.pluginId || (payload.plugin && payload.plugin.id) || '');
  </script>
</modal>
